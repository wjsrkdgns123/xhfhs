    <!-- Inline splash — paints before React bundle parses to avoid FOIT blank.
         createRoot() replaces the children on mount so no removal logic needed. -->
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: -apple-system, system-ui, 'Noto Sans KR', sans-serif;
      }
      /* Only paint these splash defaults before React mounts and useTheme
         sets data-theme. Once data-theme is present, the rules in index.css
         (which use --color-paper / --color-ink tokens) take over so dusk/dawn
         /dark themes actually apply to the body. */
      html:not([data-theme]) body { background: #f5ecd9; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme]) body { background: #1a1410; }
      }
      .initial-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        z-index: 9999;
        animation: splash-fade-in 0.2s ease-out;
      }
      .initial-splash__mark {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.04em;
        color: #1a0f08;
      }
      @media (prefers-color-scheme: dark) {
        .initial-splash__mark { color: #f0e6d2; }
      }
      .initial-splash__mark-tile {
        background: #c84b1f;
        color: #fff;
        padding: 4px 10px;
        transform: rotate(-3deg);
        display: inline-block;
        border: 1.5px solid #1a0f08;
        box-shadow: 2px 2px 0 #1a0f08;
      }
      @media (prefers-color-scheme: dark) {
        .initial-splash__mark-tile {
          border-color: #f0e6d2;
          box-shadow: 2px 2px 0 #f0e6d2;
        }
      }
      .initial-splash__dots {
        display: inline-flex;
        gap: 6px;
      }
      .initial-splash__dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c84b1f;
        animation: splash-bounce 0.9s ease-in-out infinite;
      }
      .initial-splash__dots span:nth-child(2) { animation-delay: 0.15s; }
      .initial-splash__dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-6px); opacity: 1; }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .initial-splash__dots span { animation: none; opacity: 0.6; }
        .initial-splash { animation: none; }
      }
    </style>

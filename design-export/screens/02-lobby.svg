<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 940" width="1280" height="940" font-family="'Pretendard', sans-serif">
  <defs>
    <radialGradient id="lobpaper" cx="18%" cy="6%" r="125%">
      <stop offset="0%" stop-color="#fbf6ea"/><stop offset="42%" stop-color="#f5efe0"/><stop offset="100%" stop-color="#ece3d0"/>
    </radialGradient>
    <linearGradient id="lobmast" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f6a55"/><stop offset="54%" stop-color="#335844"/><stop offset="100%" stop-color="#284835"/>
    </linearGradient>
    <radialGradient id="lobcoin" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fbeec0"/><stop offset="30%" stop-color="#f3cf6a"/><stop offset="62%" stop-color="#e6bb50"/><stop offset="100%" stop-color="#c0922f"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="940" fill="url(#lobpaper)"/>

  <!-- HEADER -->
  <rect width="1280" height="66" fill="#fcf6e8"/>
  <line x1="0" y1="66" x2="1280" y2="66" stroke="#e3d9c2" stroke-width="1.5"/>
  <text x="48" y="44" font-family="'Nanum Myeongjo', serif" font-size="26" font-weight="800" letter-spacing="-1" fill="#1a0f08">토론<tspan fill="#c84b1f">배틀</tspan></text>
  <g font-size="15" font-weight="600" fill="#3d2a1e"><text x="640" y="42">소개</text><text x="720" y="42">토론장</text><text x="812" y="42">자료실</text></g>
  <rect x="1120" y="16" width="112" height="34" rx="999" fill="#c84b1f"/>
  <text x="1176" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#fcf6e8">방 만들기</text>

  <!-- ===== MASTHEAD — 이번 주의 챔피언 ===== -->
  <g>
    <rect x="48" y="98" width="1184" height="150" rx="20" fill="url(#lobmast)"/>
    <text x="80" y="138" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" letter-spacing="2.4" fill="#cfe0d6">이번 주의 챔피언 · WEEKLY CHAMPIONS</text>
    <text x="80" y="186" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" letter-spacing="-1.5" fill="#fcf6e8">토론장</text>
    <text x="80" y="222" font-size="15" fill="#cfe0d6">지금 열린 무대에 입장하거나, 새 토론을 시작하세요.</text>
    <!-- champion coin -->
    <g transform="translate(1090 173)">
      <circle r="58" fill="url(#lobcoin)" stroke="#a07820" stroke-width="2"/>
      <text x="0" y="-6" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#6b4e16">1위</text>
      <text x="0" y="24" text-anchor="middle" font-family="'Pretendard',sans-serif" font-size="22" font-weight="800" fill="#6b4e16">87%</text>
    </g>
    <text x="980" y="178" text-anchor="end" font-size="15" font-weight="700" fill="#fcf6e8">김토론</text>
    <text x="980" y="200" text-anchor="end" font-size="13" fill="#cfe0d6">승률 87% · 13승 2패</text>
  </g>

  <!-- ===== FILTER ROW ===== -->
  <g font-family="'Pretendard',sans-serif" font-size="14" font-weight="700">
    <rect x="48" y="276" width="80" height="36" rx="999" fill="#1a0f08"/>
    <text x="88" y="299" text-anchor="middle" fill="#fcf6e8">전체</text>
    <rect x="138" y="276" width="92" height="36" rx="999" fill="#fcf6e8" stroke="#e3d9c2"/>
    <text x="184" y="299" text-anchor="middle" fill="#3d2a1e">진행중</text>
    <rect x="240" y="276" width="92" height="36" rx="999" fill="#fcf6e8" stroke="#e3d9c2"/>
    <text x="286" y="299" text-anchor="middle" fill="#3d2a1e">대기중</text>
    <text x="1232" y="299" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="13" font-weight="600" fill="#7a6450">열린 방 6</text>
  </g>

  <!-- ===== ROOM CARDS GRID (3 cols x 2 rows) ===== -->
  <!-- reusable card via copies; coords computed -->
  <g font-family="'Pretendard',sans-serif">
    <!-- Card 1 (live) -->
    <g>
      <rect x="48" y="340" width="378" height="248" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <line x1="72" y1="376" x2="96" y2="376" stroke="#c84b1f" stroke-width="1.5"/>
      <rect x="106" y="364" width="86" height="24" rx="999" fill="#fff3ec"/>
      <circle cx="120" cy="376" r="4" fill="#c84b1f"/>
      <text x="132" y="381" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="700" fill="#c84b1f">LIVE</text>
      <text x="394" y="381" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#7a6450">R3</text>
      <text x="72" y="436" font-family="'Nanum Myeongjo',serif" font-size="27" font-weight="800" letter-spacing="-1" fill="#1a0f08">사형제도 존치</text>
      <text x="72" y="466" font-size="14" fill="#7a6450">관전 12명 · 3라운드</text>
      <!-- vote bar -->
      <rect x="72" y="500" width="282" height="14" rx="7" fill="#ece3d0"/>
      <rect x="72" y="500" width="175" height="14" rx="7" fill="#c84b1f"/>
      <rect x="247" y="500" width="107" height="14" rx="7" fill="#2d4a5a"/>
      <text x="72" y="540" font-size="13" font-weight="700" fill="#c84b1f">찬성 62</text>
      <text x="354" y="540" text-anchor="end" font-size="13" font-weight="700" fill="#2d4a5a">38 반대</text>
      <rect x="72" y="552" width="282" height="0" />
    </g>
    <!-- Card 2 (waiting) -->
    <g>
      <rect x="451" y="340" width="378" height="248" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <rect x="475" y="364" width="92" height="24" rx="999" fill="#eef4f6"/>
      <text x="521" y="381" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="700" fill="#2d4a5a">대기중</text>
      <text x="475" y="436" font-family="'Nanum Myeongjo',serif" font-size="27" font-weight="800" letter-spacing="-1" fill="#1a0f08">기본소득 도입</text>
      <text x="475" y="466" font-size="14" fill="#7a6450">상대를 기다리는 중 · 5라운드</text>
      <rect x="475" y="500" width="170" height="44" rx="999" fill="#2d4a5a"/>
      <text x="560" y="528" text-anchor="middle" font-size="15" font-weight="700" fill="#fcf6e8">반대로 입장</text>
    </g>
    <!-- Card 3 (live) -->
    <g>
      <rect x="854" y="340" width="378" height="248" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <rect x="878" y="364" width="86" height="24" rx="999" fill="#fff3ec"/>
      <circle cx="892" cy="376" r="4" fill="#c84b1f"/>
      <text x="904" y="381" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="700" fill="#c84b1f">LIVE</text>
      <text x="878" y="436" font-family="'Nanum Myeongjo',serif" font-size="27" font-weight="800" letter-spacing="-1" fill="#1a0f08">AI 규제 강화</text>
      <text x="878" y="466" font-size="14" fill="#7a6450">관전 7명 · 3라운드</text>
      <rect x="878" y="500" width="282" height="14" rx="7" fill="#ece3d0"/>
      <rect x="878" y="500" width="120" height="14" rx="7" fill="#c84b1f"/>
      <rect x="998" y="500" width="162" height="14" rx="7" fill="#2d4a5a"/>
      <text x="878" y="540" font-size="13" font-weight="700" fill="#c84b1f">찬성 43</text>
      <text x="1160" y="540" text-anchor="end" font-size="13" font-weight="700" fill="#2d4a5a">57 반대</text>
    </g>
    <!-- Card 4 -->
    <g>
      <rect x="48" y="612" width="378" height="248" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <rect x="72" y="636" width="92" height="24" rx="999" fill="#f4e7c8"/>
      <text x="118" y="653" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="700" fill="#94691f">판정완료</text>
      <text x="72" y="708" font-family="'Nanum Myeongjo',serif" font-size="27" font-weight="800" letter-spacing="-1" fill="#1a0f08">동물실험 금지</text>
      <text x="72" y="738" font-size="14" fill="#7a6450">승: 찬성 · 청중50 + AI50</text>
      <g transform="translate(330 760) rotate(-6)"><circle r="40" fill="none" stroke="#c84b1f" stroke-width="3"/><text x="0" y="8" text-anchor="middle" font-family="'Pretendard',sans-serif" font-size="20" font-weight="800" fill="#c84b1f">찬 승</text></g>
      <text x="72" y="800" font-size="13" fill="#7a6450">최종 64 : 36</text>
    </g>
    <!-- Card 5 (empty / create) -->
    <g>
      <rect x="451" y="612" width="378" height="248" rx="18" fill="#f6f0e2" stroke="#e3d9c2"/>
      <line x1="640" y1="700" x2="640" y2="740" stroke="#c84b1f" stroke-width="3" stroke-linecap="round"/>
      <line x1="620" y1="720" x2="660" y2="720" stroke="#c84b1f" stroke-width="3" stroke-linecap="round"/>
      <text x="640" y="780" text-anchor="middle" font-size="16" font-weight="700" fill="#1a0f08">새 토론 무대 열기</text>
      <text x="640" y="806" text-anchor="middle" font-size="13" fill="#7a6450">주제를 고르고 입장을 정하세요</text>
    </g>
    <!-- Card 6 -->
    <g>
      <rect x="854" y="612" width="378" height="248" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <rect x="878" y="636" width="92" height="24" rx="999" fill="#eef4f6"/>
      <text x="924" y="653" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="700" fill="#2d4a5a">대기중</text>
      <text x="878" y="708" font-family="'Nanum Myeongjo',serif" font-size="27" font-weight="800" letter-spacing="-1" fill="#1a0f08">교복 자율화</text>
      <text x="878" y="738" font-size="14" fill="#7a6450">상대를 기다리는 중 · 3라운드</text>
      <rect x="878" y="772" width="170" height="44" rx="999" fill="#c84b1f"/>
      <text x="963" y="800" text-anchor="middle" font-size="15" font-weight="700" fill="#fcf6e8">찬성으로 입장</text>
    </g>
  </g>
</svg>

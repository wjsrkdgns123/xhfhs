<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1200" width="1280" height="1200" font-family="'Pretendard', sans-serif">
  <defs>
    <radialGradient id="lpaper" cx="18%" cy="6%" r="125%">
      <stop offset="0%" stop-color="#fbf6ea"/><stop offset="42%" stop-color="#f5efe0"/><stop offset="100%" stop-color="#ece3d0"/>
    </radialGradient>
    <linearGradient id="lsage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f9c86"/><stop offset="52%" stop-color="#4f7a64"/><stop offset="100%" stop-color="#3c6450"/>
    </linearGradient>
    <radialGradient id="lcoin" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fbeec0"/><stop offset="30%" stop-color="#f3cf6a"/><stop offset="62%" stop-color="#e6bb50"/><stop offset="85%" stop-color="#d4a73f"/><stop offset="100%" stop-color="#c0922f"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="1200" fill="url(#lpaper)"/>

  <!-- ===== HEADER ===== -->
  <g>
    <rect width="1280" height="66" fill="#fcf6e8"/>
    <line x1="0" y1="66" x2="1280" y2="66" stroke="#e3d9c2" stroke-width="1.5"/>
    <text x="48" y="44" font-family="'Nanum Myeongjo', serif" font-size="26" font-weight="800" letter-spacing="-1" fill="#1a0f08">토론<tspan fill="#c84b1f">배틀</tspan></text>
    <g font-size="15" font-weight="600" fill="#3d2a1e">
      <text x="640" y="42">소개</text><text x="720" y="42">토론장</text><text x="812" y="42">자료실</text>
    </g>
    <rect x="1060" y="18" width="40" height="30" rx="8" fill="none" stroke="#e3d9c2" stroke-width="1"/>
    <text x="1067" y="38" font-family="'IBM Plex Mono',monospace" font-size="12" fill="#7a6450">한</text>
    <rect x="1120" y="16" width="112" height="34" rx="999" fill="#c84b1f"/>
    <text x="1176" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#fcf6e8">방 만들기</text>
  </g>

  <!-- ===== HERO ===== -->
  <g>
    <line x1="48" y1="150" x2="72" y2="150" stroke="#c84b1f" stroke-width="1.5"/>
    <text x="82" y="155" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="700" letter-spacing="2.4" fill="#c84b1f">REAL-TIME · 1 vs 1 · KOREAN DEBATE</text>
    <text x="48" y="232" font-family="'Nanum Myeongjo', serif" font-size="76" font-weight="800" letter-spacing="-3" fill="#1a0f08">토론은 무대다</text>
    <text x="48" y="300" font-size="19" fill="#3d2a1e">AI 사회자가 진행하고, 청중이 투표합니다.</text>
    <text x="48" y="328" font-size="19" fill="#3d2a1e">마지막 판정은 <tspan font-weight="700" fill="#1a0f08">청중 50% + AI 50%</tspan>.</text>
    <rect x="48" y="366" width="180" height="56" rx="999" fill="#c84b1f"/>
    <text x="138" y="402" text-anchor="middle" font-size="17" font-weight="700" fill="#fcf6e8">지금 토론하기</text>
    <text x="252" y="402" font-size="16" font-weight="600" fill="#2d4a5a" text-decoration="underline">자료실 먼저 둘러보기 →</text>

    <!-- Sage stage panel -->
    <rect x="700" y="118" width="532" height="380" rx="24" fill="url(#lsage)"/>
    <path d="M700 238 Q700 118 820 118 L700 118 Z" fill="#ffffff" opacity="0.06"/>
    <text x="730" y="170" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#cfe0d6">오늘의 무대</text>
    <!-- faceoff -->
    <g>
      <circle cx="812" cy="300" r="60" fill="#fcf6e8" stroke="#c84b1f" stroke-width="3"/>
      <text x="812" y="312" text-anchor="middle" font-size="40" font-weight="800" fill="#c84b1f">찬</text>
      <text x="812" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#fcf6e8">PRO · 찬성</text>
      <circle cx="966" cy="290" r="30" fill="url(#lcoin)" stroke="#a07820" stroke-width="2"/>
      <text x="966" y="300" text-anchor="middle" font-family="'Nanum Myeongjo',serif" font-size="26" font-weight="900" fill="#6b4e16">VS</text>
      <circle cx="1120" cy="300" r="60" fill="#fcf6e8" stroke="#2d4a5a" stroke-width="3"/>
      <text x="1120" y="312" text-anchor="middle" font-size="40" font-weight="800" fill="#2d4a5a">반</text>
      <text x="1120" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#fcf6e8">CON · 반대</text>
    </g>
    <text x="966" y="450" text-anchor="middle" font-family="'Nanum Myeongjo',serif" font-size="24" font-weight="800" fill="#fcf6e8">"사형제도는 유지되어야 한다"</text>
  </g>

  <!-- ===== 이렇게 진행돼요 (5 steps) ===== -->
  <g>
    <line x1="48" y1="560" x2="1232" y2="560" stroke="#e3d9c2" stroke-width="1.5"/>
    <text x="48" y="610" font-family="'Nanum Myeongjo',serif" font-size="30" font-weight="800" fill="#1a0f08">이렇게 진행돼요</text>
    <g font-family="'Pretendard',sans-serif">
      <!-- step card x positions -->
      <g>
        <rect x="48"  y="640" width="218" height="150" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
        <text x="72" y="688" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" fill="#e3d9c2">01</text>
        <text x="72" y="730" font-size="17" font-weight="700" fill="#1a0f08">주제 선택</text>
        <text x="72" y="758" font-size="13" fill="#7a6450">100선에서 고르거나</text>
        <text x="72" y="776" font-size="13" fill="#7a6450">직접 입력</text>
      </g>
      <g>
        <rect x="290" y="640" width="218" height="150" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
        <text x="314" y="688" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" fill="#e3d9c2">02</text>
        <text x="314" y="730" font-size="17" font-weight="700" fill="#1a0f08">입장 선택</text>
        <text x="314" y="758" font-size="13" fill="#7a6450">찬성 또는 반대</text>
      </g>
      <g>
        <rect x="532" y="640" width="218" height="150" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
        <text x="556" y="688" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" fill="#e3d9c2">03</text>
        <text x="556" y="730" font-size="17" font-weight="700" fill="#1a0f08">라운드 진행</text>
        <text x="556" y="758" font-size="13" fill="#7a6450">입론 · 반론</text>
      </g>
      <g>
        <rect x="774" y="640" width="218" height="150" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
        <text x="798" y="688" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" fill="#e3d9c2">04</text>
        <text x="798" y="730" font-size="17" font-weight="700" fill="#1a0f08">청중 투표</text>
        <text x="798" y="758" font-size="13" fill="#7a6450">관전석에서 한 표</text>
      </g>
      <g>
        <rect x="1016" y="640" width="216" height="150" rx="18" fill="#2d4a5a"/>
        <text x="1040" y="688" font-family="'Nanum Myeongjo',serif" font-size="40" font-weight="800" fill="#5a7a8a">05</text>
        <text x="1040" y="730" font-size="17" font-weight="700" fill="#fcf6e8">판정</text>
        <text x="1040" y="758" font-size="13" fill="#bcd2dc">청중50 + AI50</text>
      </g>
    </g>
  </g>

  <!-- ===== 3 features ===== -->
  <g>
    <text x="48" y="880" font-family="'Nanum Myeongjo',serif" font-size="30" font-weight="800" fill="#1a0f08">왜 토론배틀인가</text>
    <g>
      <rect x="48"  y="910" width="378" height="170" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <circle cx="86" cy="950" r="20" fill="#fff3ec"/><text x="86" y="958" text-anchor="middle" font-size="20" fill="#c84b1f">⚖</text>
      <text x="74" y="1004" font-size="19" font-weight="700" fill="#1a0f08">공정한 50/50 판정</text>
      <text x="74" y="1036" font-size="14" fill="#7a6450">청중 감정과 AI 논리를 반반씩</text>
      <text x="74" y="1056" font-size="14" fill="#7a6450">합산해 승부를 가립니다.</text>

      <rect x="450" y="910" width="378" height="170" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <circle cx="488" cy="950" r="20" fill="#f4e7c8"/><text x="488" y="958" text-anchor="middle" font-size="20" fill="#b8842a">◈</text>
      <text x="476" y="1004" font-size="19" font-weight="700" fill="#1a0f08">AI 사회자 진행</text>
      <text x="476" y="1036" font-size="14" fill="#7a6450">중립적인 AI가 라운드를</text>
      <text x="476" y="1056" font-size="14" fill="#7a6450">매끄럽게 이끕니다.</text>

      <rect x="852" y="910" width="380" height="170" rx="18" fill="#fcf6e8" stroke="#e3d9c2"/>
      <circle cx="890" cy="950" r="20" fill="#eef4f6"/><text x="890" y="958" text-anchor="middle" font-size="20" fill="#2d4a5a">📚</text>
      <text x="878" y="1004" font-size="19" font-weight="700" fill="#1a0f08">탄탄한 자료실</text>
      <text x="878" y="1036" font-size="14" fill="#7a6450">논리 오류 54 · 용어 80+ ·</text>
      <text x="878" y="1056" font-size="14" fill="#7a6450">명토론 20선까지.</text>
    </g>
  </g>

  <!-- ===== CTA band ===== -->
  <g>
    <rect x="48" y="1110" width="1184" height="60" rx="18" fill="#1a0f08"/>
    <text x="80" y="1148" font-family="'Nanum Myeongjo',serif" font-size="24" font-weight="800" fill="#fcf6e8">지금 무대를 열면 첫 토론자 🔥</text>
    <rect x="1040" y="1124" width="160" height="32" rx="999" fill="#c84b1f"/>
    <text x="1120" y="1146" text-anchor="middle" font-size="14" font-weight="700" fill="#fcf6e8">방 만들기 →</text>
  </g>
</svg>

    <text x="119" y="63" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="700" letter-spacing="2.4" fill="#7a6450">DESIGN SYSTEM · 정본 핸드오프</text>
    <text x="85" y="120" font-family="'Nanum Myeongjo', serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#1a0f08">토론배틀 <tspan fill="#c84b1f">디자인 시스템</tspan></text>
    <text x="85" y="152" font-size="16" fill="#3d2a1e">신문 편집국에서 열리는 지적 결투 · newspaper editorial × 전략 보드게임 × 학습 리포트</text>
    <line x1="85" y1="178" x2="1355" y2="178" stroke="#e3d9c2" stroke-width="1.5"/>
  </g>


    <text x="85" y="1024" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" letter-spacing="1.6" fill="#7a6450">DISPLAY · Nanum Myeongjo 800 · headline voice</text>
    <text x="85" y="1092" font-family="'Nanum Myeongjo', serif" font-size="68" font-weight="800" letter-spacing="-2.4" fill="#1a0f08">토론은 무대다</text>

    <g>
      <text x="85" y="1138" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" letter-spacing="1.6" fill="#7a6450">UI HEADINGS · Pretendard</text>
      <text x="85" y="1178" font-size="32" font-weight="800" letter-spacing="-0.8" fill="#1a0f08">H1 — 좋은 토론은 준비에서 갈린다 (32 / 800)</text>
      <text x="85" y="1216" font-size="24" font-weight="800" letter-spacing="-0.5" fill="#1a0f08">H2 — 청중 50% + AI 50% 판정 (24 / 800)</text>
      <text x="85" y="1250" font-size="18" font-weight="700" fill="#1a0f08">H3 — 라운드별 입론과 반론 (18 / 700)</text>
    </g>

    <g>
      <text x="85" y="1296" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" letter-spacing="1.6" fill="#7a6450">BODY · Pretendard 15 / line 1.6 · ink-soft</text>

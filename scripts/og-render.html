<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@700&family=IBM+Plex+Mono:wght@700&family=Nanum+Myeongjo:wght@900&family=Nanum+Pen+Script&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #f5ecd9; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f5ecd9"/>
  <rect width="1200" height="630" fill="url(#wash)" opacity="0.6"/>
  <defs>
    <radialGradient id="wash" cx="20%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#c84b1f" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#f5ecd9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(540 280) rotate(-3)">
    <rect x="-300" y="-150" width="600" height="300" fill="#c84b1f" stroke="#1a0f08" stroke-width="10"/>
    <text x="0" y="60" text-anchor="middle"
      font-family="'Black Han Sans','Nanum Myeongjo',sans-serif"
      font-weight="900" font-size="240" fill="#fcf6e8" letter-spacing="-10">토론</text>
  </g>
  <text x="600" y="500" text-anchor="middle"
    font-family="'Gaegu','Nanum Pen Script',sans-serif"
    font-weight="700" font-size="120" fill="#1a0f08">배틀</text>
  <text x="600" y="570" text-anchor="middle"
    font-family="'IBM Plex Mono','Noto Sans KR',sans-serif"
    font-weight="700" font-size="22" fill="#7a6450" letter-spacing="6">
    REAL-TIME · 1 vs 1 · KOREAN DEBATE
  </text>
  <g transform="translate(1030 130) rotate(8)">
    <rect x="-50" y="-32" width="100" height="64" fill="#1a0f08"/>
    <text x="0" y="20" text-anchor="middle"
      font-family="'Black Han Sans',sans-serif"
      font-size="56" fill="#fcf6e8">VS</text>
  </g>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#1a0f08" stroke-width="3"/>
</svg>
</body>
</html>
